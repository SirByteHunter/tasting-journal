<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1208" />
  <title>Whisky – Tasting Journal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body class="cat-whisky">

<div id="headerContainer"></div>
<div id="setupContainer"></div>

<div class="container" id="appContent" style="display:none">
  <div class="tabs">
    <button class="tab-btn active" data-tab="collection" onclick="UI.switchTab('collection')">Sammlung</button>
    <button class="tab-btn" data-tab="add" onclick="UI.switchTab('add')">+ Neue</button>
    <button class="tab-btn" data-tab="stats" onclick="UI.switchTab('stats')">Statistiken</button>
    <button class="tab-btn" data-tab="settings" onclick="UI.switchTab('settings')">⚙️</button>
  </div>

  <!-- COLLECTION -->
  <div id="tab-collection" class="tab-content active">
    <div class="collection-header">
      <h2>Alle Verkostungen</h2>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Suchen…" oninput="App.renderCollection()" />
        <select class="sort-select" id="sortSelect" onchange="App.renderCollection()">
          <option value="date-desc">Neueste zuerst</option>
          <option value="date-asc">Älteste zuerst</option>
          <option value="score-desc">Beste Bewertung</option>
          <option value="name-asc">Name A–Z</option>
        </select>
      </div>
    </div>
    <div id="cardsContainer"></div>
  </div>

  <!-- ADD / EDIT FORM -->
  <div id="tab-add" class="tab-content">
    <div class="form-card">
      <h2 id="formTitle">Neue Whisky-Verkostung</h2>
      <input type="hidden" id="editId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Name / Bezeichnung *</label>
          <input type="text" id="f-name" placeholder="z.B. Glenfarclas 15" />
        </div>
        <div class="form-group">
          <label>Destillerie</label>
          <input type="text" id="f-distillery" placeholder="z.B. Glenfarclas" />
        </div>
        <div class="form-group">
          <label>Herkunftsland</label>
          <select id="f-country">
            <option value="">— Bitte wählen —</option>
            <option>Schottland</option><option>Irland</option><option>Japan</option>
            <option>USA</option><option>Indien</option><option>Kanada</option>
            <option>Wales</option><option>England</option><option>Deutschland</option>
            <option>Schweden</option><option>Australien</option><option>Taiwan</option>
            <option>Sonstiges</option>
          </select>
        </div>
        <div class="form-group">
          <label>Region</label>
          <input type="text" id="f-region" placeholder="z.B. Speyside, Islay…" />
        </div>
        <div class="form-group">
          <label>Alter (Jahre)</label>
          <input type="number" id="f-age" placeholder="z.B. 12" min="1" max="60" />
        </div>
        <div class="form-group">
          <label>ABV (%)</label>
          <input type="number" id="f-abv" placeholder="z.B. 46.0" min="0" max="100" step="0.1" />
        </div>
        <div class="form-group">
          <label>Fasslagerung / Finish</label>
          <input type="text" id="f-cask" placeholder="z.B. Sherry Butt, Ex-Bourbon…" />
        </div>
        <div class="form-group">
          <label>Verkostungsdatum</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label>Preis (€)</label>
          <input type="number" id="f-price" placeholder="z.B. 55.00" min="0" step="0.01" />
        </div>
        <div class="form-group full">
          <label>Nase</label>
          <textarea id="f-nose" placeholder="Erste Eindrücke beim Riechen…"></textarea>
        </div>
        <div class="form-group full">
          <label>Gaumen</label>
          <textarea id="f-palate" placeholder="Geschmack, Textur, Entwicklung…"></textarea>
        </div>
        <div class="form-group full">
          <label>Abgang</label>
          <textarea id="f-finish" placeholder="Länge und Nachklang…"></textarea>
        </div>
        <div class="form-group full">
          <label>Persönliche Notizen</label>
          <textarea id="f-notes" placeholder="Kontext, Anlass, Vergleiche…"></textarea>
        </div>
        <div class="form-group">
          <label>Punktzahl (0–100)</label>
          <div class="score-wrap">
            <input type="range" id="f-score" min="0" max="100" value="80" oninput="document.getElementById('scoreVal').textContent=this.value" />
            <span class="score-val" id="scoreVal">80</span>
          </div>
        </div>
        <div class="form-group">
          <label>Sterne (1–5)</label>
          <div id="starPickerContainer"></div>
        </div>
        <div class="form-group full">
          <label>Foto vom Etikett</label>
          <div id="photoUploadContainer"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="App.resetForm()">Zurücksetzen</button>
        <button class="btn btn-primary" onclick="App.save()">💾 Speichern</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="tab-stats" class="tab-content">
    <div id="statsContent"></div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsContainer"></div>
</div>

<div id="detailModalContainer"></div>

<script src="shared/core.js"></script>
<script src="shared/gdrive.js"></script>
<script src="shared/ui.js"></script>
<script src="whisky.js"></script>
</body>
</html>
